# =============================================================================
# Render Blueprint — Infrastructure as Code
# Deploy: https://render.com/docs/blueprint-spec
# =============================================================================

databases:
  - name: invoice-tracker-db
    databaseName: invoice_tracker
    plan: free
    ipAllowList: []

services:
  - type: web
    name: invoice-tracker-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm --prefix server install --include=dev && npm --prefix client install --include=dev && npm --prefix server run build && npm --prefix client run build
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: invoice-tracker-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: "*"
      - key: TRUST_PROXY
        value: "true"
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: PORT
        value: "10000"
